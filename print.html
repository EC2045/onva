<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onva Practice Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="byam.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        @media print {
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .print-container {
                width: 100%;
                max-width: 100%;
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            @page {
                size: A4 portrait;
                margin: 1.5cm;
            }

            .page-break {
                page-break-before: always;
            }
        }

        .practice-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .practice-row {
            display: flex;
            gap: 0;
            border-left: 2px solid #cbd5e1;
        }

        .practice-cell {
            width: 70px;
            height: 70px;
            border-top: 2px solid #cbd5e1;
            border-bottom: 2px solid #cbd5e1;
            border-right: 2px solid #cbd5e1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .word-cell .onva,
        .word-cell .onva-container {
            width: 100%;
        }

        .word-cell .onva-images {
            width: 100%;
            justify-content: space-around !important;
        }

        .word-cell .onva-images img {
            margin: 0 !important;
        }

        .guide-grid {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 1;
        }

        .guide-box {
            width: 70px;
            height: 70px;
            position: relative;
            box-sizing: border-box;
            border-right: 1px dashed #cbd5e1;
        }

        .guide-box:last-child {
            border-right: none;
        }

        /* 十字のガイドライン */
        .guide-box::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px dashed #e2e8f0;
        }

        .guide-box::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            border-left: 1px dashed #e2e8f0;
        }

        .cell-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .tracing {
            opacity: 0.15;
        }

        .ruby-top {
            position: absolute;
            top: 4px;
            font-size: 8px;
            font-weight: bold;
            color: #64748b;
            line-height: 1;
            text-align: center;
            width: 100%;
        }

        .ruby-bottom {
            position: absolute;
            bottom: 4px;
            font-size: 8px;
            font-weight: bold;
            line-height: 1;
            text-align: center;
            width: 100%;
        }

        .def-text {
            color: #3b82f6;
        }

        .alpha-text {
            color: #94a3b8;
        }

        .onva-images img {
            height: 1.6em !important;
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <!-- Navbar (No Print) -->
    <nav class="no-print bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="onva font-bold text-slate-900">!anbya</span>
            <div class="flex gap-4">
                <a href="index.html"
                    class="text-[11px] font-bold tracking-widest text-slate-500 hover:text-slate-900 uppercase">Kingdom</a>
                <a href="anvum.html"
                    class="text-[11px] font-bold tracking-widest text-slate-500 hover:text-slate-900 uppercase">!Anbyam</a>
                <a href="study.html"
                    class="text-[11px] font-bold tracking-widest text-slate-500 hover:text-slate-900 uppercase">Study</a>
                <a href="print.html"
                    class="text-blue-600 border-b-2 border-blue-600 pb-1 text-[11px] font-bold tracking-widest uppercase">Practice</a>
            </div>
            <button onclick="window.print()"
                class="px-5 py-2 bg-slate-900 text-white rounded-full text-xs font-bold hover:bg-slate-800 transition shadow-lg">🖨️
                印刷する (Print)</button>
        </div>
    </nav>

    <main class="pt-8 px-4 max-w-[800px] mx-auto print-container">

        <!-- Sheet Header -->
        <header class="mb-8 text-center pb-6 border-b-2 border-slate-900">
            <h1 class="text-3xl font-black text-slate-900 mb-2 uppercase tracking-widest">byam writing practice</h1>
            <p class="text-slate-500 text-sm font-bold">onva言語 筆記練習シート</p>

            <div class="mt-6 flex justify-between px-10 text-[10px] font-bold text-slate-400">
                <div class="flex gap-4"><span>DATE <span
                            class="inline-block w-20 border-b border-slate-400"></span></span></div>
                <div class="flex gap-4"><span>NAME <span
                            class="inline-block w-32 border-b border-slate-400"></span></span></div>
            </div>
        </header>

        <!-- Characters Section -->
        <section class="mb-12">
            <h2 class="text-lg font-black mb-4 text-slate-700 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-blue-500 rounded-full inline-block"></span> Basic Characters (18文字)
            </h2>
            <div id="chars-grid" class="practice-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Page break for printing if needed -->
        <!-- <div class="page-break"></div> -->

        <!-- Words Section -->
        <section class="mb-12">
            <h2 class="text-lg font-black mb-4 text-slate-700 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-emerald-500 rounded-full inline-block"></span> Common Words (単語)
            </h2>
            <div id="words-grid" class="practice-grid">
                <!-- Injected via JS -->
            </div>
        </section>

    </main>

    <script src="vocabulary.js"></script>
    <script>
        const byams = [
            { k: "!a", r: "ア゛" }, { k: "e", r: "エ" }, { k: "u", r: "ウ" }, { k: "wo", r: "ヲ" },
            { k: "i", r: "イ" }, { k: "yu", r: "ユ" }, { k: "r", r: "R" }, { k: "b", r: "B" },
            { k: "g", r: "G" }, { k: "p", r: "P" }, { k: "bya", r: "ビャ" }, { k: "m", r: "M" },
            { k: "n", r: "ン" }, { k: "z", r: "Z" }, { k: "sye", r: "シェ" }, { k: "ge", r: "ゲ" },
            { k: "t", r: "T" }, { k: "h", r: "H" }
        ];

        const wordsToPractice = [
            { k: "!ann", m: "知恵/思考" },
            { k: "be", m: "美" },
            { k: "wo-!a", m: "太陽" },
            { k: "ritt", m: "AI/計算" },
            { k: "b-u", m: "楽しい/良" },
            { k: "te-wo", m: "さようなら" },
            { k: "sye!ab", m: "よろしく" }
        ];

        const COLS = 10; // Total boxes per row

        function buildRow(item, isWord) {
            const row = document.createElement('div');
            row.className = 'practice-row';

            // Calculate length of word in symbols
            const regex = /(bya|sye|ge|wo|!a|e|u|i|yu|r|b|g|p|m|n|z|t|h|\-)/g;
            const match = item.k.match(regex);
            const numSymbols = match ? match.length : 1;

            const cellWidth = numSymbols * 70;

            // Cell width class
            const cellClass = isWord ? 'practice-cell word-cell' : 'practice-cell';
            const drawCols = isWord ? Math.floor(COLS / numSymbols) : COLS;

            for (let i = 0; i < drawCols; i++) {
                const cell = document.createElement('div');
                cell.className = cellClass;
                if (isWord) cell.style.width = cellWidth + 'px';

                // Draw internal guidelines
                const guideGrid = document.createElement('div');
                guideGrid.className = 'guide-grid';
                for (let s = 0; s < numSymbols; s++) {
                    const gBox = document.createElement('div');
                    gBox.className = 'guide-box';
                    guideGrid.appendChild(gBox);
                }
                cell.appendChild(guideGrid);

                // Content wrapper
                const content = document.createElement('div');
                content.className = 'cell-content';

                // First cell: Model (Black)
                if (i === 0) {
                    content.innerHTML = `
                        <div class="ruby-top">${isWord ? '' : item.r}</div>
                        <div class="onva text-2xl font-black">${item.k}</div>
                        <div class="ruby-bottom ${isWord ? 'def-text' : 'alpha-text'}">${isWord ? item.m : item.k}</div>
                    `;
                }
                // Second cell: Tracing (Light)
                else if (i === 1) {
                    content.innerHTML = `
                        <div class="ruby-top opacity-30">${isWord ? '' : item.r}</div>
                        <div class="onva text-2xl font-black tracing opacity-20">${item.k}</div>
                        <div class="ruby-bottom opacity-30 ${isWord ? 'def-text' : 'alpha-text'}">${isWord ? item.m : item.k}</div>
                    `;
                }
                // Other cells: Blank

                cell.appendChild(content);
                row.appendChild(cell);
            }
            return row;
        }

        window.addEventListener('load', () => {
            const charsGrid = document.getElementById('chars-grid');
            byams.forEach(b => charsGrid.appendChild(buildRow(b, false)));

            const wordsGrid = document.getElementById('words-grid');
            wordsToPractice.forEach(w => wordsGrid.appendChild(buildRow(w, true)));

            // Force rendering of the newly injected .onva elements
            if (typeof window.renderOnva === 'function') {
                window.renderOnva();
            }
        });
    </script>
</body>

</html>
